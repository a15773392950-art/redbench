<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>

/*==========================================================================
 *  ★★★ Vercel 部署方案 ★★★
 *
 *  works.json 只需填年份和文件夹编号，不用填图片名。
 *  content.txt / other.txt / 封面图 → 相对路径读取（无限速）
 *  photo/ 图片列表 → 点击作品时 GitHub API 自动获取
 *
 *  works.json 格式（超简单）:
 *  { "years": [
 *    { "year": 2025, "folders": ["1","2","4","5","6"] },
 *    { "year": 2024, "folders": ["1","2","3"] }
 *  ]}
 *==========================================================================*/

var YEARS_CONFIG = [];
var PHOTO_API = 'https://api.github.com/repos/a15773392950-art/redbench/contents/image';

async function loadAllData() {
  try {
    var r = await fetch('works.json');
    if (!r.ok) throw new Error('works.json not found');
    var config = await r.json();

    var allFetches = [];
    var fetchMeta = [];

    for (var yi = 0; yi < config.years.length; yi++) {
      var yc = config.years[yi];
      for (var wi = 0; wi < yc.folders.length; wi++) {
        var base = 'image/' + yc.year + '/' + yc.folders[wi];
        allFetches.push(fetch(base + '/content.txt').then(function(r) { return r.ok ? r.text() : ''; }).catch(function() { return ''; }));
        allFetches.push(fetch(base + '/other.txt').then(function(r) { return r.ok ? r.text() : ''; }).catch(function() { return ''; }));
        fetchMeta.push({ year: yc.year, folder: yc.folders[wi], base: base });
      }
    }

    var results = await Promise.all(allFetches);

    var yearMap = {};
    for (var i = 0; i < fetchMeta.length; i++) {
      var meta = fetchMeta[i];
      var contentTxt = results[i * 2] || '';
      var otherTxt = results[i * 2 + 1] || '';
      var name = meta.folder, body = '';
      if (contentTxt) {
        var lines = contentTxt.split('\n');
        name = lines[0].trim() || name;
        body = lines.slice(1).join('\n').trim();
      }
      if (!yearMap[meta.year]) yearMap[meta.year] = [];
      yearMap[meta.year].push({
        name: name, cover: meta.base + '/firstimage.png',
        body: body, photos: null, other: otherTxt.trim(),
        _base: meta.base, _apiPath: meta.year + '/' + meta.folder
      });
    }

    YEARS_CONFIG = [];
    var sortedYears = Object.keys(yearMap).sort(function(a, b) { return b - a; });
    for (var yi2 = 0; yi2 < sortedYears.length; yi2++) {
      var y = parseInt(sortedYears[yi2]);
      var works = yearMap[y];
      YEARS_CONFIG.push({
        year: y, count: works.length, works: works,
        names: works.map(function(w) { return w.name; }),
        titles: works.map(function(w) { return w.name; })
      });
    }
    console.log('加载完成:', YEARS_CONFIG.map(function(c) { return c.year + '(' + c.count + '作品)'; }).join(', '));
    return true;
  } catch(e) {
    console.warn('works.json 加载失败:', e);
    YEARS_CONFIG = [{ year: 2025, count: 1, works: [{ name: '加载失败', cover: '', body: '请确认 works.json 存在', photos: [], other: '', _base: '', _apiPath: '' }], names: ['加载失败'], titles: ['加载失败'] }];
    return false;
  }
}

/* 点击作品时用 GitHub API 获取 photo/ 里的图片列表（每个作品只调1次） */
function loadPhotos(w, callback) {
  if (w.photos !== null) { callback(); return; }
  fetch(PHOTO_API + '/' + w._apiPath + '/photo')
    .then(function(r) { return r.ok ? r.json() : []; })
    .catch(function() { return []; })
    .then(function(items) {
      if (!Array.isArray(items)) { w.photos = []; callback(); return; }
      var imgs = items.filter(function(f) {
        var n = f.name.toLowerCase();
        return n.endsWith('.jpg') || n.endsWith('.png') || n.endsWith('.jpeg') || n.endsWith('.webp') || n.endsWith('.gif');
      });
      imgs.sort(function(a, b) { return a.name.localeCompare(b.name); });
      w.photos = imgs.map(function(f) { return f.download_url || (w._base + '/photo/' + f.name); });
      callback();
    });
}

const THEME = { accent: 0xc0392b, ground: 0xf6f5f2, card: 0xfcfcfb };
const MAX_CARDS = 12, RING_R = 4.2;
const CW = .85, CH = .85, CT = .025;
const CAM_DIST = 7.2, CAM_H = 6.8, TILT = Math.PI / 4;
const HOVER_ARC = 160 * Math.PI / 180; /* ★ 160° front arc */
let curIdx = 0;

/* ===== SCENE ===== */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf6f5f2);
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, .1, 120);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.getElementById('cv').appendChild(renderer.domElement);

/* ===== LIGHTS ===== */
scene.add(new THREE.AmbientLight(0xffffff, .5));
const dL = new THREE.DirectionalLight(0xffffff, .7);
dL.position.set(5, 16, 8); dL.castShadow = true;
dL.target.position.set(0, 0, 0); /* explicit target at center */
dL.shadow.mapSize.set(2048, 2048);
dL.shadow.camera.near = .5; dL.shadow.camera.far = 50;
dL.shadow.camera.left = -15; dL.shadow.camera.right = 15;
dL.shadow.camera.top = 15; dL.shadow.camera.bottom = -15;
dL.shadow.bias = -.0005; dL.shadow.normalBias = .02;
scene.add(dL); scene.add(dL.target);
scene.add(new THREE.DirectionalLight(0xf0e8e0, .25).translateX(-5).translateY(8).translateZ(-5));
scene.add(new THREE.HemisphereLight(0xffffff, 0xeee8e0, .3));
const hSpot = new THREE.SpotLight(0xffeedd, 0, 10, Math.PI / 5, .7, 1.2);
hSpot.position.set(0, 5, 0); scene.add(hSpot); scene.add(hSpot.target);

/* ===== GROUND ===== */
const gP = new THREE.Mesh(new THREE.PlaneGeometry(120, 120), new THREE.MeshStandardMaterial({ color: THEME.ground, roughness: .96 }));
gP.rotation.x = -Math.PI / 2; gP.position.y = -.005; gP.receiveShadow = true; scene.add(gP);

/* ring guide */
const rgM = new THREE.Mesh(new THREE.RingGeometry(RING_R - .012, RING_R + .012, 96), new THREE.MeshBasicMaterial({ color: 0xe0ddd6, side: THREE.DoubleSide, transparent: true, opacity: .35 }));
rgM.rotation.x = -Math.PI / 2; rgM.position.y = .002; scene.add(rgM);

/* sector glow */

/* ===== PIANO SOUND (Web Audio — no external files) ===== */
let audioCtx = null;
function playPianoNote(freq) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;

    /* Main tone — sine for purity */
    const osc1 = audioCtx.createOscillator();
    osc1.type = 'sine';
    osc1.frequency.value = freq;

    /* Soft overtone for brightness */
    const osc2 = audioCtx.createOscillator();
    osc2.type = 'sine';
    osc2.frequency.value = freq * 2;

    /* Third partial — very quiet shimmer */
    const osc3 = audioCtx.createOscillator();
    osc3.type = 'sine';
    osc3.frequency.value = freq * 3;

    /* Gain envelopes — piano-like: quick attack, gentle decay */
    const g1 = audioCtx.createGain();
    g1.gain.setValueAtTime(0, now);
    g1.gain.linearRampToValueAtTime(0.18, now + 0.008);  /* sharp attack */
    g1.gain.exponentialRampToValueAtTime(0.06, now + 0.3);
    g1.gain.exponentialRampToValueAtTime(0.001, now + 1.2);

    const g2 = audioCtx.createGain();
    g2.gain.setValueAtTime(0, now);
    g2.gain.linearRampToValueAtTime(0.06, now + 0.005);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.6);

    const g3 = audioCtx.createGain();
    g3.gain.setValueAtTime(0, now);
    g3.gain.linearRampToValueAtTime(0.025, now + 0.003);
    g3.gain.exponentialRampToValueAtTime(0.001, now + 0.35);

    osc1.connect(g1); g1.connect(audioCtx.destination);
    osc2.connect(g2); g2.connect(audioCtx.destination);
    osc3.connect(g3); g3.connect(audioCtx.destination);

    osc1.start(now); osc2.start(now); osc3.start(now);
    osc1.stop(now + 1.3); osc2.stop(now + 0.7); osc3.stop(now + 0.4);
  } catch(e) { /* audio not available, silent fallback */ }
}
/* Two different notes for scroll direction */
const NOTE_FWD = 523.25; /* C5 */
const NOTE_BWD = 659.25; /* E5 */

/* ===== RING TRANSITION — fade + slide + sound ===== */
let trn = false;
function goTo(ni, dir) {
  if (ni < 0 || ni >= YEARS_CONFIG.length || ni === curIdx || trn) return;
  trn = true;
  playPianoNote(dir > 0 ? NOTE_FWD : NOTE_BWD);
  const on = Math.min(YEARS_CONFIG[curIdx].count, MAX_CARDS);
  /* Phase 1: old cards fade out + slide inward (dir>0) or outward (dir<0) */
  for (let i = 0; i < MAX_CARDS; i++) {
    const c = cards[i];
    if (i < on) {
      c.tOp = 0;
      c.tR = dir > 0 ? 0.5 : RING_R + 3.5; /* inward or outward */
    }
  }
  /* Phase 2: after fade, new cards start from outside/inside and slide to RING_R */
  let savedDir = dir;
  setTimeout(() => {
    const d = YEARS_CONFIG[ni], n = Math.min(d.count, MAX_CARDS);
    for (let i = 0; i < MAX_CARDS; i++) {
      const c = cards[i];
      if (i < n) {
        const a = (i / n) * Math.PI * 2;
        c.a = a;
        /* Start position: forward scroll → new cards come from outside; backward → from center */
        c.cR = savedDir > 0 ? RING_R + 3.5 : 0.5;
        c.tR = RING_R; /* slide to correct position */
        posC(c, a, c.cR);
        c.op = 0; c.tOp = 1; c.g.visible = true;
        const lb = `R${ni + 1}_P${i + 1}`;
        var cached = loadIT(d.year, i + 1); c.fM.map = (cached && cached !== "loading") ? cached : makePH(lb, d.year, i); c.fM.needsUpdate = true;
        c.lb = (d.titles && d.titles[i]) ? d.titles[i] : lb; c.yr = d.year; c.pi = i; c.ri = ni; c.nm = (d.names && d.names[i]) ? d.names[i] : '作品名称';
      } else { c.tOp = 0; c.g.visible = false; }
    }
    curIdx = ni;
    updY(YEARS_CONFIG[ni].year);
    setTimeout(() => trn = false, 100);
  }, 700);
}

let rY = 0, tRY = 0, drg = false, lmx = 0, aR = true, arT = null, hL = false;

function scA(d) { clearTimeout(arT); arT = setTimeout(() => { if (!hL) aR = true; }, d || 800); }

let ltx = 0, tsy = 0;
renderer.domElement.addEventListener('touchstart', e => { if (e.touches.length === 1) { ltx = e.touches[0].clientX; tsy = e.touches[0].clientY; drg = true; } stA(); });

}, { passive: false });

var workOpen = false;
var camHTgt = CAM_H, camHCur = CAM_H;

camera.lookAt(0, -1, 0);

    if (Math.abs(c.tX - c.tTX) < .001) c.tX = c.tTX;

        c.op = 0; c.tOp = 1; c.g.visible = true;
        var lb = 'R' + (curIdx + 1) + '_P' + (i + 1);
        var cached = loadIT(d.year, i + 1); c.fM.map = (cached && cached !== "loading") ? cached : makePH(lb, d.year, i); c.fM.needsUpdate = true;
        c.lb = (d.titles && d.titles[i]) ? d.titles[i] : lb; c.yr = d.year; c.pi = i; c.ri = curIdx; c.nm = (d.names && d.names[i]) ? d.names[i] : '作品名称';
      } else { c.tOp = 0; c.g.visible = false; }
      }
    /* Set aboutOpen false after camera has settled */
    setTimeout(function() { aboutOpen = false; }, 1000);
  }, 500);
}

aboutBtn.addEventListener('click', openAbout);
aboutTop.addEventListener('click', closeAbout);

/* ===== WORK DETAIL VIEW ===== */
var workOverlay = document.getElementById('work-overlay');
var workInfo = document.getElementById('work-info');
var workTitle = document.getElementById('work-title');
var workBody = document.getElementById('work-body');
var workCarousel = document.getElementById('work-carousel');
var workCaption = document.getElementById('work-caption');
var clickedCard = null;
var clickStartX = 0, clickStartY = 0;
var carouselIdx = 0;
var carouselImages = [];
var carouselTimer = null;

renderer.domElement.addEventListener('mousedown', function(e) {
  clickStartX = e.clientX; clickStartY = e.clientY;
});

renderer.domElement.addEventListener('click', function(e) {
  if (Math.abs(e.clientX - clickStartX) > 5 || Math.abs(e.clientY - clickStartY) > 5) return;
  if (aboutOpen || workOpen || trn) return;
  var clickMouse = new THREE.Vector2(
    (e.clientX / innerWidth) * 2 - 1,
    -(e.clientY / innerHeight) * 2 + 1
  );
  var clickRay = new THREE.Raycaster();
  clickRay.setFromCamera(clickMouse, camera);
  var clickTargets = [];
  cards.forEach(function(c) {
    if (c.g.visible && c.op > .5) c.g.traverse(function(ch) { if (ch.isMesh) clickTargets.push(ch); });
  });
  var clickHits = clickRay.intersectObjects(clickTargets, false);
  if (clickHits.length > 0) {
    var hitObj = clickHits[0].object;
    var hitCard = cards.find(function(c) { var f = false; c.g.traverse(function(ch) { if (ch === hitObj) f = true; }); return f; });
    if (hitCard && inF(hitCard)) {
      openWorkView(hitCard);
    }
  }
});

function openWorkView(card) {
  if (workOpen || aboutOpen) return;
  workOpen = true;
  clickedCard = card;

  /* Populate content from config */
  workInfo.textContent = card.yr + ' · ' + (card.pi + 1) + ' · ' + card.nm;
  workTitle.textContent = card.nm;

  /* Find work data */
  var yc = YEARS_CONFIG.find(function(c) { return c.year === card.yr; });
  var w = yc && yc.works[card.pi];

  /* Body text */
  if (w && w.body) {
    var bodyLines = w.body.split('\n');
    var bodyHtml = '';
    for (var bi = 0; bi < bodyLines.length; bi++) {
      var bl = bodyLines[bi].trim();
      if (bl) bodyHtml += '<p>' + bl + '</p>';
    }
    workBody.innerHTML = bodyHtml;
  } else {
    workBody.innerHTML = '<p>暂无介绍</p>';
  }
  workBody.scrollTop = 0;

  /* Caption from other */
  workCaption.textContent = (w && w.other) ? w.other : '';

  /* Carousel from photos — lazy load via GitHub API */
  carouselIdx = 0;
  carouselImages = [];
  var placeholder = workCarousel.querySelector('#work-carousel-placeholder');
  var existingImg = workCarousel.querySelector('img');
  if (existingImg) existingImg.remove();
  placeholder.style.display = 'flex';
  placeholder.textContent = '加载图片...';

  function showLoadedPhotos() {
    carouselImages = (w && w.photos) ? w.photos : [];
    if (carouselImages.length > 0) {
      placeholder.style.display = 'none';
      var img = document.createElement('img');
      img.src = carouselImages[0];
      workCarousel.insertBefore(img, workCarousel.firstChild);
      startCarousel();
    } else {
      placeholder.textContent = '暂无图片';
    }
  }

  if (w && w.photos !== null) {
    showLoadedPhotos();
  } else if (w) {
    loadPhotos(w, showLoadedPhotos);
  } else {
    placeholder.textContent = '暂无图片';
  }

  /* Fade out all cards inward */
  for (var i = 0; i < MAX_CARDS; i++) { cards[i].tOp = 0; cards[i].tR = 0.5; }

  /* Hide UI */
  document.getElementById('year-panel').style.opacity = '0';
  document.getElementById('year-panel').style.pointerEvents = 'none';
  document.getElementById('hint').classList.add('hidden');
  document.getElementById('legend').style.opacity = '0';
  document.getElementById('rc').style.opacity = '0';
  aboutBtn.style.opacity = '0';
  aboutBtn.style.pointerEvents = 'none';
  rgM.visible = false;
  document.getElementById('vignette').style.opacity = '0';

  /* Camera */
  var halfPi = Math.PI / 2;
  tRY = Math.round(rY / halfPi) * halfPi;
  camHTgt = 3.0;
  camDTgt = 1.5;
  camOrbitTgt = 0.05;
  camLookTgt = 0.3;

  setTimeout(function() {
    workOverlay.classList.add('open');
  }, 500);
}

function closeWorkView() {
  if (!workOpen) return;
  workOverlay.classList.remove('open');
  stopCarousel();

  camHTgt = CAM_H;
  camDTgt = CAM_DIST;
  camOrbitTgt = 1;
  camLookTgt = -1;
  workOpen = false;

  setTimeout(function() {
    rgM.visible = true;
    document.getElementById('vignette').style.opacity = '1';
    document.getElementById('year-panel').style.opacity = '1';
    document.getElementById('year-panel').style.pointerEvents = '';
    document.getElementById('hint').classList.remove('hidden');
    document.getElementById('legend').style.opacity = '';
    document.getElementById('rc').style.opacity = '';
    aboutBtn.style.opacity = '1';
    aboutBtn.style.pointerEvents = '';
    var d = YEARS_CONFIG[curIdx], n = Math.min(d.count, MAX_CARDS);
    for (var i = 0; i < MAX_CARDS; i++) {
      var c = cards[i];
      if (i < n) {
        var a = (i / n) * Math.PI * 2;
        c.a = a; c.cR = RING_R + 4; c.tR = RING_R;
        posC(c, a, c.cR);
        c.op = 0; c.tOp = 1; c.g.visible = true;
        var lb = 'R' + (curIdx + 1) + '_P' + (i + 1);
        var cached = loadIT(d.year, i + 1); c.fM.map = (cached && cached !== "loading") ? cached : makePH(lb, d.year, i); c.fM.needsUpdate = true;
        c.lb = (d.titles && d.titles[i]) ? d.titles[i] : lb; c.yr = d.year; c.pi = i; c.ri = curIdx; c.nm = (d.names && d.names[i]) ? d.names[i] : '作品名称';
      } else { c.tOp = 0; c.g.visible = false; }
    }
  }, 500);
}

/* Carousel controls */
function startCarousel() {
  stopCarousel();
  if (carouselImages.length > 1) {
    carouselTimer = setInterval(function() { showCarouselImg(carouselIdx + 1); }, 4000);
  }
}
function stopCarousel() { if (carouselTimer) { clearInterval(carouselTimer); carouselTimer = null; } }
function showCarouselImg(idx) {
  if (carouselImages.length === 0) return;
  carouselIdx = ((idx % carouselImages.length) + carouselImages.length) % carouselImages.length;
  var placeholder = workCarousel.querySelector('#work-carousel-placeholder');
  var existingImg = workCarousel.querySelector('img');
  if (existingImg) existingImg.src = carouselImages[carouselIdx];
  else {
    placeholder.style.display = 'none';
    var img = document.createElement('img');
    img.src = carouselImages[carouselIdx];
    workCarousel.insertBefore(img, workCarousel.firstChild);
  }
}

document.getElementById('carousel-prev').addEventListener('click', function(e) {
  e.stopPropagation();
  showCarouselImg(carouselIdx - 1);
  startCarousel();
});
document.getElementById('carousel-next').addEventListener('click', function(e) {
  e.stopPropagation();
  showCarouselImg(carouselIdx + 1);
  startCarousel();
});

/* Click on empty area (not content) to go back */
workOverlay.addEventListener('click', function(e) {
  if (e.target === workOverlay) closeWorkView();
});
document.getElementById('work-back-hint').addEventListener('click', closeWorkView);
/* Also click on the 3D canvas area behind to go back */
document.getElementById('work-content').addEventListener('click', function(e) {
  if (e.target === document.getElementById('work-content')) closeWorkView();
});

/* ===== 加载关于页面文本 ===== */
fetch('intro.txt')
  .then(function(r) { return r.ok ? r.text() : ''; })
  .catch(function() { return ''; })
  .then(function(txt) {
    var el = document.getElementById('about-left');
    if (!el || !txt) return;
    var html = '';
    txt.split('\n').forEach(function(line) { if (line.trim()) html += '<p>' + line.trim() + '</p>'; });
    el.innerHTML = html;
  });

/* Set email link */
(function() {
  var u = 'redbenchlab', d = 'outlook.com', full = u + String.fromCharCode(64) + d;
  var el = document.getElementById('email-link');
  var et = document.getElementById('email-text');
  if (el) el.href = 'mailto:' + full;
  if (et) et.textContent = 'E-mail: ' + full;
})();

addEventListener('resize', function() {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
